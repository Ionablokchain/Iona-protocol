name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Standard build, lint, tests ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt check
        run: cargo fmt -- --check

      - name: clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: tests
        run: cargo test --locked

      - name: release build (iona-node only)
        run: cargo build --release --locked --bin iona-node

  # ── 2. Determinism check ─────────────────────────────────────────────────
  determinism:
    name: Determinism check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run determinism test
        run: cargo test --locked --test determinism -- --nocapture

  # ── 3. Upgrade simulation tests ────────────────────────────────────────────
  upgrade-sim:
    name: Upgrade simulation tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run upgrade simulation tests
        run: cargo test --locked --test upgrade_sim -- --nocapture

  # ── 4. Replay test ─────────────────────────────────────────────────────────
  replay:
    name: Replay test (snapshot + blocks)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run replay tests
        run: cargo test --locked --test replay -- --nocapture

  # ── 5. Cross-platform determinism ──────────────────────────────────────────
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: Run determinism tests
        run: cargo test --locked --test determinism -- --nocapture
      - name: Run upgrade simulation tests
        run: cargo test --locked --test upgrade_sim -- --nocapture

  # ── 6. Fuzzing ────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target:
          - consensus_msg
          - tx_json
          - p2p_frame_decode
          - vm_bytecode
          - block_header
          - rpc_json

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-${{ matrix.target }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Create corpus dir if absent
        run: mkdir -p fuzz/corpus/${{ matrix.target }}

      - name: Run fuzzer
        env:
          FUZZ_SECS: "60"
        run: |
          cargo fuzz run ${{ matrix.target }} \
            fuzz/corpus/${{ matrix.target }} \
            -- -max_total_time=$FUZZ_SECS -max_len=65536 \
            2>&1 | tee fuzz_output.txt
          if grep -qE "CRASH|ERROR|panic|AddressSanitizer" fuzz_output.txt; then
            echo "::error::Fuzzer found a crash in ${{ matrix.target }}"
            exit 1
          fi

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz_output.txt

      - name: Save fuzz corpus
        if: always()
        uses: actions/cache/save@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

  # ── 7. Schema migration smoke test ───────────────────────────────────────
  schema-migration:
    name: Schema migration smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run schema migration tests
        run: cargo test --locked schema_migration -- --nocapture

  # ── 8. Property tests ─────────────────────────────────────────────────────
  proptests:
    name: Property tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Run proptests (256 cases each)
        env:
          PROPTEST_CASES: "256"
        run: cargo test --locked --test proptests -- --nocapture

  # ── 9. SBOM generation ─────────────────────────────────────────────────────
  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --output sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  # ── 10. Benchmarks (compile-check only in CI) ─────────────────────────────
  benchmarks:
    name: Benchmark compile check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Check benchmarks compile
        run: cargo test --locked --benches --no-run
