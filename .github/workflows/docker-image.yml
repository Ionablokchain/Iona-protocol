# Docker Image CI for IONA
#
# This workflow builds the Docker image for the IONA node on every push to `main`,
# on version tags, and on pull requests. It uses Docker caching, Buildx, and
# multi‑platform builds to speed up and secure the build process.
#
# It optionally pushes to GitHub Container Registry (GHCR) on tags or pushes to `main`.
#
# Environment variables:
#   - REGISTRY: container registry (default: ghcr.io)
#   - IMAGE_NAME: name of the image (default: ${{ github.repository }})
#   - PLATFORMS: platforms to build (default: linux/amd64,linux/arm64)
#   - DOCKER_BUILDKIT: Enable BuildKit (default: 1)
#
# Secrets:
#   - GHCR_TOKEN: token for pushing to GitHub Container Registry (if enabled)
#   - SLACK_WEBHOOK_URL: Slack webhook for notifications (optional)

name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * 0"   # Weekly on Sunday 04:00 UTC
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma‑separated)"
        required: false
        default: "linux/amd64,linux/arm64"
      push_enabled:
        description: "Push to registry"
        required: false
        default: "true"
      slack_notify:
        description: "Enable Slack notifications"
        required: false
        default: "true"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  # ── 1. Build and test Docker image ────────────────────────────────────
  build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.12.5
            network=host

      # ── Log in to registry ───────────────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event.inputs.push_enabled != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Cache Docker layers ─────────────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── Extract Docker metadata ──────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=IONA Node
            org.opencontainers.image.description=IONA Blockchain Node
            org.opencontainers.image.vendor=IONA Foundation
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      # ── Build Docker image ────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event.inputs.push_enabled != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=gha
          cache-to: |
            type=local,dest=/tmp/.buildx-cache,mode=max
            type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            RUST_VERSION=${{ hashFiles('rust-toolchain.toml') }}
          provenance: false
          sbom: true

      # ── Smoke test ──────────────────────────────────────────────────
      - name: Smoke test Docker image
        if: github.event_name != 'pull_request'
        run: |
          # Get the first tag from the build output
          IMAGE_TAG=${{ steps.meta.outputs.tags }} | head -n1
          echo "Testing image: $IMAGE_TAG"
          docker run --rm $IMAGE_TAG --version
          docker run --rm $IMAGE_TAG --help

      # ── Health check test ────────────────────────────────────────────
      - name: Health check test
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_TAG=${{ steps.meta.outputs.tags }} | head -n1
          docker run -d --name iona-test --rm -p 7001:7001 $IMAGE_TAG
          sleep 5
          docker logs iona-test | head -20 || true
          docker stop iona-test

      # ── Upload build artifacts ──────────────────────────────────────
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-logs
          path: |
            /tmp/.buildx-cache
            /tmp/buildx.log

  # ── 2. Security scan (Trivy) ──────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: false
          scanners: 'vuln,secret,config'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Run Trivy in report mode
        run: |
          docker run --rm aquasec/trivy image --format table --severity HIGH,CRITICAL ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>&1 | tee trivy_report.txt

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy_report.txt

  # ── 3. Security scan (Grype) ──────────────────────────────────────────
  grype-scan:
    name: Security Scan (Grype)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Run Grype scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: /__w/iona/iona/anchore-reports/*

  # ── 4. SBOM generation ─────────────────────────────────────────────────
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Upload SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Slack notification ─────────────────────────────────────────────
  slack-notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [build, security-scan, grype-scan, sbom]
    if: always() && github.event.inputs.slack_notify != 'false'
    steps:
      - name: Determine overall status
        id: status
        run: |
          ALL_JOBS="${{ toJson(needs) }}"
          echo "$ALL_JOBS" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          critical = ['build']
          failed_critical = [j for j in critical if needs[j]['result'] not in ('success', 'skipped')]
          if failed_critical:
              print('❌ Failure (build failed)')
          else:
              non_critical = [j for j in needs.keys() if j not in critical]
              failed_non_critical = [j for j in non_critical if needs[j]['result'] == 'failure']
              if failed_non_critical:
                  print('⚠️ Warning (non-critical jobs failed)')
              else:
                  print('✅ Success')
          " > status.txt
          echo "status=$(cat status.txt)" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "IONA Docker Image CI: ${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*IONA Docker Image CI*\nStatus: ${{ steps.status.outputs.status }}\nBranch: ${{ github.ref_name }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>\nImage: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── 6. Final gate ──────────────────────────────────────────────────────
  final-gate:
    name: "✅ Docker CI Gate"
    runs-on: ubuntu-latest
    needs:
      - build
      - security-scan
      - grype-scan
      - sbom
      - slack-notify
    if: always()
    steps:
      - name: Aggregate results
        run: |
          ALL_JOBS="${{ toJson(needs) }}"
          echo "$ALL_JOBS" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          critical = ['build']
          failed_critical = [j for j in critical if needs[j]['result'] not in ('success', 'skipped')]
          if failed_critical:
              print(f'Critical jobs failed: {failed_critical}')
              sys.exit(1)
          # Non-critical failures are warnings
          non_critical = [j for j in needs.keys() if j not in critical and j not in ['final-gate', 'slack-notify']]
          failed_non_critical = [j for j in non_critical if needs[j]['result'] == 'failure']
          if failed_non_critical:
              print(f'Non-critical jobs failed (warnings): {failed_non_critical}')
          print('All critical Docker jobs passed ✓')
          " || exit 1
