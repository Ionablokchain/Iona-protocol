# Rust CI for IONA
#
# This workflow runs on every push to `main` and on pull requests.
# It performs:
#   - Code formatting check (`cargo fmt`)
#   - Linting (`cargo clippy`)
#   - Compilation and testing on multiple platforms (Linux, macOS, Windows)
#   - Documentation generation (`cargo doc`)
#   - Security audit (`cargo audit`)
#   - Fuzzing regression (optional, if fuzz targets are present)
#
# Environment variables:
#   - RUSTFLAGS: "-D warnings" to treat warnings as errors in CI
#
# Secrets:
#   - (none required)

name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -------------------------------------------------------------------------
  # Code formatting (must pass)
  # -------------------------------------------------------------------------
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          override: true

      - name: Check formatting
        run: cargo fmt --all -- --check

  # -------------------------------------------------------------------------
  # Clippy linting (must pass)
  # -------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -------------------------------------------------------------------------
  # Test on multiple platforms (Linux, macOS, Windows)
  # -------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]  # Wait for linting to pass before testing
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          # Additional test on nightly (optional, for future features)
          - os: ubuntu-latest
            rust: nightly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for determinism tests

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - name: Cache cargo registry, build, and target
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose --all-targets

      - name: Run tests
        run: cargo test --verbose --all-targets

      # Optional: run determinism tests separately (if they take long)
      # - name: Run determinism tests
      #   run: cargo test --test determinism -- --nocapture

      # Optional: run doc tests
      - name: Run doctests
        run: cargo test --doc

  # -------------------------------------------------------------------------
  # Documentation build (ensure no warnings)
  # -------------------------------------------------------------------------
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # -------------------------------------------------------------------------
  # Security audit (cargo audit)
  # -------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run security audit
        run: cargo audit

  # -------------------------------------------------------------------------
  # Fuzzing regression (optional, runs only on schedule or manual trigger)
  # -------------------------------------------------------------------------
  fuzz:
    name: Fuzzing (Regression)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache cargo registry and fuzz artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run fuzz targets (short time)
        run: |
          cargo fuzz run consensus_msg -- -max_total_time=30
          cargo fuzz run tx_json -- -max_total_time=30
          # Add other fuzz targets as needed
