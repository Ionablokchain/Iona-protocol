name: Security

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit \
            --deny warnings \
            --deny unsound \
            --file Cargo.lock \
            --json 2>&1 | tee audit-output.json || AUDIT_FAILED=1

          echo "=== Audit Summary ==="
          if command -v jq >/dev/null 2>&1; then
            jq -r '
              .vulnerabilities.list[]? |
              "[\(.advisory.severity // "unknown")] \(.advisory.id): \(.advisory.title)\n  Crate: \(.package.name)@\(.package.version)\n  URL: \(.advisory.url // "n/a")\n"
            ' audit-output.json 2>/dev/null || echo "(no vulnerabilities found)"
          fi

          if [ "${AUDIT_FAILED:-0}" = "1" ]; then
            echo "::error::cargo-audit found vulnerabilities. Review audit-output.json."
            exit 1
          fi

          echo "::notice::cargo-audit passed"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-results
          path: audit-output.json
          retention-days: 30

  deny:
    name: cargo-deny (licenses + bans + advisories + sources)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check — licenses
        run: cargo deny check licenses

      - name: cargo deny check — bans
        run: cargo deny check bans

      - name: cargo deny check — advisories
        run: cargo deny check advisories

      - name: cargo deny check — sources
        run: cargo deny check sources

      - name: cargo deny check — combined summary
        if: always()
        run: cargo deny check --exclude-dev || true

  fuzz:
    name: Fuzz smoke — ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - state_transition
          - rpc_parse
          - block_decode
          - p2p_message
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        shell: bash
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup override set nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target/
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fuzz smoke test (30 seconds)
        shell: bash
        run: |
          set -o pipefail
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=30 \
            -max_len=4096 \
            -timeout=10 \
            -print_final_stats=1 \
            2>&1 | tee fuzz-output-${{ matrix.target }}.txt

          CRASHES=$(find fuzz/artifacts/${{ matrix.target }}/ -type f 2>/dev/null | wc -l)
          if [ "$CRASHES" -gt 0 ]; then
            echo "::error::Fuzzer found $CRASHES crash(es) in ${{ matrix.target }}"
            ls -la fuzz/artifacts/${{ matrix.target }}/ || true
            exit 1
          fi

          echo "::notice::Fuzz smoke passed for ${{ matrix.target }}"

      - name: Upload fuzz output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-output-${{ matrix.target }}
          path: |
            fuzz-output-${{ matrix.target }}.txt
            fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

      - name: Upload crash artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          CHANNEL=$(grep 'channel' rust-toolchain.toml | cut -d'"' -f2)
          rustup toolchain install "$CHANNEL"
          rustup override set "$CHANNEL"

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        shell: bash
        run: |
          cargo cyclonedx --format json --verbose
          test -f iona.cdx.json
          echo "SBOM generated: $(wc -c < iona.cdx.json) bytes"

      - name: Validate SBOM structure
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          with open("iona.cdx.json", "r", encoding="utf-8") as f:
              sbom = json.load(f)

          assert sbom.get("bomFormat") == "CycloneDX", "bomFormat must be CycloneDX"
          assert sbom.get("specVersion") in ["1.3", "1.4", "1.5"], f"Unexpected specVersion: {sbom.get('specVersion')}"
          comps = sbom.get("components", [])
          assert len(comps) > 0, "No components found in SBOM"

          for c in comps:
              assert "name" in c, f"Component missing name: {c}"
              assert "version" in c, f"Component missing version: {c}"

          print(f"SBOM valid: {len(comps)} components, specVersion={sbom['specVersion']}")
          PY

      - name: Install grype
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan SBOM for CVEs
        shell: bash
        run: |
          set -o pipefail
          grype sbom:iona.cdx.json --output table 2>&1 | tee grype-results.txt || true

          if grype sbom:iona.cdx.json --fail-on critical --quiet 2>/dev/null; then
            echo "::notice::No critical CVEs found in SBOM"
          else
            echo "::error::Critical CVEs found! Review grype-results.txt"
            exit 1
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            iona.cdx.json
            grype-results.txt
          retention-days: 90

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  security-gate:
    name: Security gate
    needs: [audit, deny, sbom, secrets]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check all security jobs passed
        shell: bash
        run: |
          AUDIT="${{ needs.audit.result }}"
          DENY="${{ needs.deny.result }}"
          SBOM="${{ needs.sbom.result }}"
          SECRETS="${{ needs.secrets.result }}"

          echo "audit:   $AUDIT"
          echo "deny:    $DENY"
          echo "sbom:    $SBOM"
          echo "secrets: $SECRETS"

          if [[ "$AUDIT" != "success" ]] || \
             [[ "$DENY" != "success" ]]  || \
             [[ "$SBOM" != "success" ]]  || \
             [[ "$SECRETS" != "success" && "$SECRETS" != "skipped" ]]; then
            echo "::error::One or more security checks failed. Blocking merge."
            exit 1
          fi

          echo "::notice::All security checks passed"