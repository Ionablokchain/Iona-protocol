name: Security Gate

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTUP_HOME: /usr/local/rustup
  CARGO_HOME: /usr/local/cargo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  supply-chain:
    name: Supply-chain (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo audit (advisories)
        run: cargo audit --deny warnings
      - name: cargo deny check
        run: cargo deny check
      - name: Cargo.lock is committed
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "::error::Cargo.lock is missing — must be committed for reproducible builds"
            exit 1
          fi
          echo "Cargo.lock present ✓"

  locked-build:
    name: Locked build (--locked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --locked
        run: cargo build --locked --all-targets
      - name: Release build --locked
        run: cargo build --release --locked --bin iona-node

  unsafe-audit:
    name: Unsafe code audit (crypto/ + consensus/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No unsafe in src/crypto/
        run: |
          COUNT=$(grep -rn --include="*.rs" "unsafe" src/crypto/ | grep -v "//.*unsafe" | wc -l)
          echo "unsafe blocks found in src/crypto/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT unsafe block(s) in src/crypto/ — forbidden in security-critical code"
            grep -rn --include="*.rs" "unsafe" src/crypto/ | grep -v "//.*unsafe"
            exit 1
          fi
          echo "src/crypto/ is unsafe-free ✓"
      - name: No unsafe in src/consensus/
        run: |
          COUNT=$(grep -rn --include="*.rs" "unsafe" src/consensus/ | grep -v "//.*unsafe" | wc -l)
          echo "unsafe blocks found in src/consensus/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT unsafe block(s) in src/consensus/ — forbidden in security-critical code"
            grep -rn --include="*.rs" "unsafe" src/consensus/ | grep -v "//.*unsafe"
            exit 1
          fi
          echo "src/consensus/ is unsafe-free ✓"

  unwrap-audit:
    name: Unwrap audit (rpc/ + net/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No bare .unwrap() in src/rpc/
        run: |
          COUNT=$(grep -rn --include="*.rs" "\.unwrap()" src/rpc/ \
                  | grep -v "#\[cfg(test)\]" \
                  | grep -v "// unwrap-ok:" \
                  | wc -l)
          echo ".unwrap() calls in src/rpc/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT .unwrap() call(s) in src/rpc/ — use .expect() or ? instead"
            grep -rn --include="*.rs" "\.unwrap()" src/rpc/ | grep -v "#\[cfg(test)\]" | grep -v "// unwrap-ok:"
            exit 1
          fi
          echo "src/rpc/ unwrap-free ✓"
      - name: No bare .unwrap() in src/net/
        run: |
          COUNT=$(grep -rn --include="*.rs" "\.unwrap()" src/net/ \
                  | grep -v "#\[cfg(test)\]" \
                  | grep -v "// unwrap-ok:" \
                  | wc -l)
          echo ".unwrap() calls in src/net/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT .unwrap() call(s) in src/net/ — use .expect() or ? instead"
            grep -rn --include="*.rs" "\.unwrap()" src/net/ | grep -v "#\[cfg(test)\]" | grep -v "// unwrap-ok:"
            exit 1
          fi
          echo "src/net/ unwrap-free ✓"

  security-tests:
    name: Security test suites
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Consensus adversarial tests
        run: cargo test --locked --test consensus_adversarial -- --nocapture
      - name: Security regression tests
        run: cargo test --locked --test security_regression -- --nocapture

  rpc-hardening:
    name: RPC hardening tests
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: RPC hardening tests
        run: cargo test --locked --test rpc_hardening -- --nocapture

  fuzz-replay:
    name: Fuzz corpus replay (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    strategy:
      fail-fast: false
      matrix:
        target:
          - consensus_msg
          - tx_json
          - p2p_frame_decode
          - vm_bytecode
          - block_header
          - rpc_json
          - state_transition
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-replay-${{ matrix.target }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Create corpus dir if absent
        run: mkdir -p fuzz/corpus/${{ matrix.target }}
      - name: Replay corpus (no new exploration)
        run: |
          CORPUS_DIR="fuzz/corpus/${{ matrix.target }}"
          SEED_COUNT=$(find "$CORPUS_DIR" -type f | wc -l)
          echo "Replaying $SEED_COUNT corpus entries for ${{ matrix.target }}"
          if [ "$SEED_COUNT" -eq "0" ]; then
            echo "No corpus entries — running minimal smoke fuzz (5 s) to seed."
            cargo fuzz run ${{ matrix.target }} \
              "$CORPUS_DIR" \
              -- -max_total_time=5 -max_len=65536 2>&1 | tee fuzz_output.txt
          else
            cargo fuzz run ${{ matrix.target }} \
              "$CORPUS_DIR" \
              -- -runs=0 -max_len=65536 2>&1 | tee fuzz_output.txt
          fi
          if grep -qE "CRASH|ERROR|AddressSanitizer" fuzz_output.txt; then
            echo "::error::Corpus replay found a crash in ${{ matrix.target }}"
            exit 1
          fi
          echo "Corpus replay clean ✓"
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-replay-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz_output.txt

  clippy-sec:
    name: Clippy (security paths, deny-warnings)
    runs-on: ubuntu-latest
    needs: locked-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy --all-targets -D warnings
        run: cargo clippy --locked --all-targets -- -D warnings

  security-gate:
    name: "✅ Security Gate"
    runs-on: ubuntu-latest
    needs:
      - supply-chain
      - locked-build
      - unsafe-audit
      - unwrap-audit
      - security-tests
      - rpc-hardening
      - fuzz-replay
      - clippy-sec
    if: always()
    steps:
      - name: Check all security jobs passed
        run: |
          RESULTS='${{ toJson(needs) }}'
          echo "$RESULTS" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED jobs:', failed)
              sys.exit(1)
          print('All security jobs passed ✓')
          "
