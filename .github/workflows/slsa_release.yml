name: slsa-provenance-release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      subjects: ${{ steps.subjects.outputs.base64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy
      - name: Build (release)
        run: |
          cargo build --release --locked --bin iona-node
          mkdir -p dist
          cp target/release/iona-node dist/iona-node
          cp target/release/iona-remote-signer dist/iona-remote-signer || true
          cp target/release/iona-chaos dist/iona-chaos || true
      - name: Checksums
        run: |
          (cd dist && sha256sum * > SHA256SUMS.txt)
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/iona-node
            dist/iona-remote-signer
            dist/iona-chaos
            dist/SHA256SUMS.txt

      - name: Prepare SLSA subjects
        id: subjects
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Create a JSON array of subjects with sha256 digests
          echo -n '[' > subjects.json
          first=1
          for f in iona-node iona-remote-signer iona-chaos SHA256SUMS.txt; do
            if [ -f "$f" ]; then
              if [ $first -eq 0 ]; then echo -n ',' >> subjects.json; fi
              first=0
              hash=$(sha256sum "$f" | cut -d' ' -f1)
              echo -n "{\"name\":\"$f\",\"digest\":{\"sha256\":\"$hash\"}}" >> subjects.json
            fi
          done
          echo -n ']' >> subjects.json
          b64=$(base64 -w0 < subjects.json)
          echo "base64=$b64" >> "$GITHUB_OUTPUT"

  provenance:
    needs: build
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2
    with:
      base64-subjects: ${{ needs.build.outputs.subjects }}
    permissions:
      actions: read
      id-token: write
      contents: write
