# =============================================================================
# cargo-deny configuration for IONA
# =============================================================================
# This file controls `cargo deny` checks for:
#   - license compliance
#   - security advisories
#   - duplicate dependencies
#   - crate sources
#
# Run: cargo deny check
# =============================================================================

# -----------------------------------------------------------------------------
# License compliance
# -----------------------------------------------------------------------------
[licenses]
# List of allowed licenses. All crates must have at least one license from this list.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "0BSD",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

# Licenses explicitly denied (GPL family is incompatible with Apache-2.0).
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

# Require explicit license text in Cargo.toml (prevents implicit fallback).
require_explicit = true

# If a crate has multiple licenses, all must be allowed.
allow_openssl = true

# -----------------------------------------------------------------------------
# Security advisories
# -----------------------------------------------------------------------------
[advisories]
# How to treat unmaintained crates (warn at workspace level, not deny).
unmaintained = "workspace"

# How to treat unsound crates.
unsound = "workspace"

# Severity threshold for vulnerabilities (default: medium).
# Uncomment to set a custom threshold.
# severity-threshold = "medium"

# Ignored advisories (reviewed and accepted as not exploitable or not applicable).
ignore = [
    # 2026 batch tolerated until upstreams are updated
    "RUSTSEC-2026-0002", # lru unsound
    "RUSTSEC-2026-0044",
    "RUSTSEC-2026-0045",
    "RUSTSEC-2026-0046",
    "RUSTSEC-2026-0047",
    "RUSTSEC-2026-0048",
    "RUSTSEC-2026-0049",

    # Older transitive issues temporarily tolerated
    "RUSTSEC-2021-0145", # atty unsound on Windows
    "RUSTSEC-2024-0375", # atty unmaintained
    "RUSTSEC-2024-0437",
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
    "RUSTSEC-2025-0141", # bincode unmaintained
]

# -----------------------------------------------------------------------------
# Crate bans (duplicate versions, wildcard dependencies)
# -----------------------------------------------------------------------------
[bans]
# Warn when multiple versions of the same crate are used (prevents bloat).
multiple-versions = "warn"

# Deny wildcard dependencies (e.g., `version = "*"`).
wildcards = "deny"

# Show all crates in duplicate reports, not just the first.
highlight = "all"

# Skip specific crates from duplicate detection (rarely needed).
skip = []

# Skip entire trees of crates (rarely needed).
skip-tree = []

# Explicitly allow certain wildcard paths (if unavoidable).
# allow-wildcard-paths = []

# -----------------------------------------------------------------------------
# Sources (crate registries)
# -----------------------------------------------------------------------------
[sources]
# Deny unknown registries (only allow explicitly listed ones).
unknown-registry = "deny"

# Deny unknown git repositories.
unknown-git = "deny"

# Allow the official crates.io registry.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow specific git repositories (empty by default; add if needed).
allow-git = []

# -----------------------------------------------------------------------------
# Ban specific crates entirely (optional)
# -----------------------------------------------------------------------------
# [bans.deny]
# crates = []   # list of crate names to deny (e.g., ["openssl-sys"])
