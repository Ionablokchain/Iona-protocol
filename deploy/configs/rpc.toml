# =============================================================================
# IONA v28 — RPC Node (public endpoint) — PRODUCTION READY
# =============================================================================
# Topology: val2, val3, val4 = producers; val1 = follower; rpc = public endpoint
# Chain: iona-testnet-1 (chain_id=6126151), launch=2026-03-01T12:00:00Z
#
# The RPC node does NOT produce blocks and does NOT participate in consensus.
# It connects to producers via bootnodes, syncs state, and exposes a public API.
# 
# IMPORTANT: Put a reverse proxy (nginx/caddy) with TLS + rate limiting in front.
# Do NOT expose port 9000 directly to the internet without TLS and DDoS protection.
#
# Environment variables:
#   IONA_DATA_DIR         - Override data directory (default: /var/lib/iona/rpc)
#   IONA_RPC_PORT         - Override RPC port (default: 9000)
#   IONA_P2P_PORT         - Override P2P port (default: 30337)
#   IONA_SEED             - Node seed (default: 100)
#   IONA_LOG_LEVEL        - Log level (default: info)
#   IONA_RPC_API_KEY      - API key for RPC authentication (optional but recommended)
#   IONA_KEYSTORE_PASSWORD - Password for encrypted keystore (if used)
# =============================================================================

# -----------------------------------------------------------------------------
# Node identity and logging
# -----------------------------------------------------------------------------
[node]
# Data directory – ensure it exists and has correct permissions (0700)
data_dir = "${IONA_DATA_DIR:-/var/lib/iona/rpc}"

# Deterministic seed for key generation (non‑validator, can be any number)
seed = ${IONA_SEED:-100}

# Chain ID – must match all nodes in the network
chain_id = 6126151

# Log level: trace | debug | info | warn | error
log_level = "${IONA_LOG_LEVEL:-info}"

# Log format: "plain" or "json" (recommended for production)
log_format = "json"

# Keystore mode: "plain" (no signing needed for RPC) or "encrypted"
keystore = "plain"

# Optional: keystore password (only if keystore = "encrypted")
# keystore_password = "${IONA_KEYSTORE_PASSWORD}"
# keystore_password_env = "IONA_KEYSTORE_PASSWORD"

# -----------------------------------------------------------------------------
# Consensus (disabled for RPC node)
# -----------------------------------------------------------------------------
[consensus]
# Timeouts (ms) – RPC node never proposes, but must respect consensus timing
propose_timeout_ms   = 300
prevote_timeout_ms   = 200
precommit_timeout_ms = 200

# Block limits
max_txs_per_block = 4096
gas_target        = 43_000_000   # 43 million gas target

# Fast quorum: skip timeouts when 2/3+ votes arrive
fast_quorum = true

# Base fee (initial)
initial_base_fee = 1

# Staking – not used by RPC node, but must match producers
stake_each = 1000

# CRITICAL: RPC node must NEVER produce blocks
simple_producer = false

# Validator seeds – must match the consensus participants (producers)
# This is only needed for verification; can be omitted and loaded from genesis.
validator_seeds = [2, 3, 4]

# Protocol upgrade schedule (optional; uses defaults if omitted)
# [[consensus.protocol_activations]]
# protocol_version = 1
# activation_height = null
# grace_blocks = 0
#
# [[consensus.protocol_activations]]
# protocol_version = 2
# activation_height = 100000
# grace_blocks = 10

# -----------------------------------------------------------------------------
# P2P networking
# -----------------------------------------------------------------------------
[network]
# Listen multiaddress – public port for P2P
listen = "/ip4/0.0.0.0/tcp/${IONA_P2P_PORT:-30337}"

# Static peers (producers) – used for state sync and consensus messages
peers = [
  "/ip4/10.0.1.2/tcp/30334",   # val2 (producer)
  "/ip4/10.0.1.3/tcp/30335",   # val3 (producer)
  "/ip4/10.0.1.4/tcp/30336",   # val4 (producer)
]

# Bootnodes – same as static peers for redundancy
bootnodes = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
]

# Discovery
enable_mdns = false   # disable mDNS (not needed in production)
enable_kad  = true    # enable Kademlia DHT for peer discovery

# Reconnection interval (seconds)
reconnect_s = 30

# Connection limits (anti‑DoS)
max_connections          = 200
max_inbound_connections  = 150   # protect against inbound floods
max_outbound_connections = 50
max_connections_per_ip   = 20    # prevent Sybil

# P2P state sync – fast bootstrap from peers
enable_p2p_state_sync    = true
state_sync_chunk_bytes   = 1_048_576   # 1 MiB
state_sync_timeout_s     = 15

# Request‑response rate limits (prevent resource exhaustion)
[network.rr_limits]
max_req_per_sec_block   = 15
max_req_per_sec_status  = 30
max_req_per_sec_range   = 5
max_req_per_sec_state   = 10
max_bytes_per_sec_block  = 1_000_000
max_bytes_per_sec_status = 100_000
max_bytes_per_sec_range  = 500_000

# Peer scoring and quarantine (aggressive)
peer_strike_decay_s = 60
peer_score_decay_s  = 120
peer_quarantine_s   = 300
rr_strikes_before_quarantine = 2
rr_strikes_before_ban        = 3
rr_quarantines_before_ban    = 1
persist_quarantine = true
quarantine_path = "${IONA_DATA_DIR:-/var/lib/iona/rpc}/quarantine.json"

# Eclipse attack protection (diversity buckets)
[network.diversity]
bucket_kind = "ip16"
max_inbound_per_bucket = 4
max_outbound_per_bucket = 2
eclipse_detection_min_buckets = 3
reseed_cooldown_s = 60

# Gossipsub limits (reduce spam)
[network.gossipsub]
allowed_topics = ["iona/tx", "iona/blocks", "iona/evidence"]
deny_unknown_topics = true
max_publish_msgs_per_sec = 30
max_publish_bytes_per_sec = 2_000_000
max_in_msgs_per_sec = 100
max_in_bytes_per_sec = 5_000_000

# -----------------------------------------------------------------------------
# Mempool (RPC node maintains a mempool for submitted transactions)
# -----------------------------------------------------------------------------
[mempool]
capacity = 200_000          # maximum pending transactions
max_tx_size = 32768         # 32 KiB per transaction
min_gas_price = 10          # reject underpriced transactions
max_gas_price = 10_000      # upper bound
max_priority_fee_per_gas = 100

# -----------------------------------------------------------------------------
# RPC server (public endpoint)
# -----------------------------------------------------------------------------
[rpc]
# PUBLIC LISTEN ADDRESS – must be protected by a reverse proxy with TLS!
listen = "0.0.0.0:${IONA_RPC_PORT:-9000}"

# API key authentication – strongly recommended for public nodes
enable_api_key = true
api_key_header = "X-API-Key"
api_key_value = "${IONA_RPC_API_KEY}"   # MUST be set via environment variable

# Enable testnet faucet (only for testnets; disable in production)
enable_faucet = true

# CORS: allow cross‑origin requests (set to true only if behind a proxy that handles it)
cors_allow_all = false
cors_allowed_origins = ["https://your-frontend.com"]

# Rate limiting (requests per second per IP)
rate_limit_enabled = true
rate_limit_requests_per_second = 50
rate_limit_burst = 100

# Maximum body size (1 MiB)
max_body_bytes = 1_048_576

# Maximum JSON depth (prevent deep recursion attacks)
max_json_depth = 16

# Concurrent request limit
max_concurrent_requests = 100

# -----------------------------------------------------------------------------
# Storage and snapshots
# -----------------------------------------------------------------------------
[storage]
# Enable periodic snapshots for faster restart
enable_snapshots = true

# Snapshot frequency (blocks)
snapshot_every_n_blocks = 500

# Number of snapshots to keep
snapshot_keep = 10

# Compression level (1‑22, 3 = good balance)
snapshot_zstd_level = 3

# Database cache (MB)
db_cache_size_mb = 1024

# Maximum concurrent background tasks
max_concurrent_tasks = 128

# Write‑ahead log settings
[storage.wal]
max_segment_bytes = 67_108_864   # 64 MiB
keep_segments = 3
fsync_every_write = true

# -----------------------------------------------------------------------------
# Audit logging (security‑critical events)
# -----------------------------------------------------------------------------
[audit]
log_path = "${IONA_DATA_DIR:-/var/lib/iona/rpc}/audit.jsonl"
max_file_size_bytes = 104_857_600   # 100 MiB
rotate_count = 10
emit_to_tracing = true

# -----------------------------------------------------------------------------
# Observability (optional)
# -----------------------------------------------------------------------------
[observability]
# OpenTelemetry export (requires --features otel)
enable_otel = false
otel_endpoint = "http://127.0.0.1:4317"
service_name = "iona-rpc"

# -----------------------------------------------------------------------------
# Remote signer (not used by RPC node)
# -----------------------------------------------------------------------------
[signing]
mode = "local"
# remote_url = "http://127.0.0.1:9100"
# remote_timeout_s = 10

# =============================================================================
# Security checklist for this RPC node:
# =============================================================================
# 1. Run behind a reverse proxy with TLS (nginx/caddy).
# 2. Set `IONA_RPC_API_KEY` to a strong secret and enforce authentication.
# 3. Enable rate limiting on the proxy (e.g., 10 req/s per IP).
# 4. Set firewall rules to allow only P2P (30337) and proxy (443) inbound.
# 5. Use a dedicated non‑root user (e.g., `iona`) with 0700 permissions on data_dir.
# 6. Rotate logs and monitor disk usage.
# 7. Keep the node software up‑to‑date.
# 8. For production mainnet, set `enable_faucet = false` and disable `cors_allow_all`.
# 9. Consider running the node in a read‑only filesystem where possible.
# =============================================================================
