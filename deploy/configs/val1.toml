# =============================================================================
# IONA v28 — Validator 1 (full node / follower / indexer)
# =============================================================================
# Topology: val2, val3, val4 = producers; val1 = follower; rpc = public endpoint
# Chain: iona-testnet-1 (chain_id=6126151), launch=2026-03-01T12:00:00Z
#
# val1 does NOT produce blocks. It follows consensus, indexes data,
# and can serve as an explorer backend or internal API.
#
# Security: This node holds an encrypted validator key (even if not producing)
# so the keystore password must be provided via environment variable.
# =============================================================================

# -----------------------------------------------------------------------------
# Node identity and logging
# -----------------------------------------------------------------------------
[node]
# Data directory – ensure it exists and has correct permissions (0700)
data_dir = "/var/lib/iona/val1"

# Deterministic seed for key generation (must be unique per node)
seed = 1

# Chain ID – must match all nodes in the network
chain_id = 6126151

# Log level: trace | debug | info | warn | error
log_level = "info"

# Keystore mode: "encrypted" (recommended for validator keys)
keystore = "encrypted"

# Keystore password – DO NOT hardcode. Provide via environment variable.
# Plaintext password in config is used as fallback if env not set.
keystore_password = ""
keystore_password_env = "IONA_KEYSTORE_PASSWORD"

# -----------------------------------------------------------------------------
# Consensus (follower mode – no block production)
# -----------------------------------------------------------------------------
[consensus]
# Timeouts (ms) – follower must respect consensus timing, even if not proposing
propose_timeout_ms   = 300
prevote_timeout_ms   = 200
precommit_timeout_ms = 200

# Block limits
max_txs_per_block = 4096
gas_target        = 43_000_000   # 43 million gas target

# Fast quorum: skip timeouts when 2/3+ votes arrive
fast_quorum = true

# Base fee (initial)
initial_base_fee = 1

# Staking – not used by follower, but must match producers
stake_each = 1000

# CRITICAL: val1 is NOT a producer
simple_producer = false

# Validator seeds – must match the consensus participants (producers)
validator_seeds = [2, 3, 4]

# Protocol upgrade schedule (optional; uses defaults if omitted)
# protocol_activations = [
#   { protocol_version = 1, activation_height = null, grace_blocks = 0 },
#   { protocol_version = 2, activation_height = 100000, grace_blocks = 10 }
# ]

# -----------------------------------------------------------------------------
# P2P networking
# -----------------------------------------------------------------------------
[network]
# Listen multiaddress – P2P port (internal network)
listen = "/ip4/0.0.0.0/tcp/30333"

# Static peers – connect to all producers for consensus and state sync
peers = [
  "/ip4/10.0.1.2/tcp/30334",   # val2 (producer)
  "/ip4/10.0.1.3/tcp/30335",   # val3 (producer)
  "/ip4/10.0.1.4/tcp/30336",   # val4 (producer)
]

# Bootnodes – same as static peers for redundancy
bootnodes = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
]

# Discovery
enable_mdns = false   # disable mDNS (not needed in production)
enable_kad  = true    # enable Kademlia DHT for peer discovery

# Reconnection interval (seconds)
reconnect_s = 30

# Connection limits (anti‑DoS)
max_connections_total    = 200
max_connections_per_peer = 8

# P2P state sync – fast bootstrap from peers
enable_p2p_state_sync    = true
state_sync_chunk_bytes   = 1_048_576   # 1 MiB
state_sync_timeout_s     = 15

# Optional: request‑response rate limits (adjust as needed)
# rr_max_req_per_sec_block   = 15
# rr_max_req_per_sec_status  = 30
# rr_max_req_per_sec_range   = 5
# rr_max_req_per_sec_state   = 10

# Optional: peer scoring and quarantine
# peer_quarantine_s = 60
# rr_strikes_before_quarantine = 2

# Eclipse attack protection (diversity buckets)
# diversity_bucket_kind = "ip16"
# max_inbound_per_bucket = 4
# eclipse_detection_min_buckets = 3
# reseed_cooldown_s = 60

# Optional: persist quarantine list
# quarantine_path = "/var/lib/iona/val1/quarantine.json"
# persist_quarantine = true

# -----------------------------------------------------------------------------
# Mempool (follower maintains a mempool for submitted transactions)
# -----------------------------------------------------------------------------
[mempool]
capacity = 200_000   # maximum pending transactions

# -----------------------------------------------------------------------------
# RPC server (internal only)
# -----------------------------------------------------------------------------
[rpc]
# Listen on loopback only – not exposed publicly.
# Use a reverse proxy if external access is required.
listen = "127.0.0.1:9001"

# Faucet disabled – this is an internal node
enable_faucet = false

# CORS: restrict to internal tools
cors_allow_all = false

# Optional: RPC rate limiting (see rpc_limits.rs)
# max_concurrent_requests = 100
# submit_rate_per_sec = 100
# read_rate_per_sec = 500

# -----------------------------------------------------------------------------
# Storage and snapshots
# -----------------------------------------------------------------------------
[storage]
# Enable periodic snapshots for faster restart
enable_snapshots = true

# Snapshot frequency (blocks)
snapshot_every_n_blocks = 500

# Number of snapshots to keep
snapshot_keep = 10

# Compression level (1‑22, 3 = good balance)
snapshot_zstd_level = 3

# Maximum concurrent background tasks (default: 256)
# max_concurrent_tasks = 256

# -----------------------------------------------------------------------------
# Observability (optional)
# -----------------------------------------------------------------------------
[observability]
# OpenTelemetry export (requires --features otel)
enable_otel = false
otel_endpoint = "http://127.0.0.1:4317"
service_name = "iona-val1"

# -----------------------------------------------------------------------------
# Remote signer (not used by this node)
# -----------------------------------------------------------------------------
[signing]
mode = "local"
# remote_url = "http://127.0.0.1:9100"
# remote_timeout_s = 10
# remote_tls_* options omitted

# =============================================================================
# Security checklist for this follower node:
# =============================================================================
# 1. Use a dedicated non‑root user (e.g., `iona`) with 0700 permissions on data_dir.
# 2. Store the keystore password securely (e.g., HashiCorp Vault, systemd service file).
# 3. Expose RPC only on loopback (127.0.0.1) – use a reverse proxy if external access needed.
# 4. Firewall: allow P2P (30333) inbound from producer IPs, block all other inbound.
# 5. Rotate logs and monitor disk usage.
# 6. Keep the node software up‑to‑date.
# 7. This node does not produce blocks, so it cannot be slashed – but the key is still sensitive.
# =============================================================================
