# =============================================================================
# IONA RPC Reverse Proxy — Production‑Grade Configuration
# =============================================================================
#
# Install:
#   sudo cp deploy/nginx/rpc.conf /etc/nginx/sites-available/iona-rpc
#   sudo ln -s /etc/nginx/sites-available/iona-rpc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - nginx ≥ 1.18 (apt install nginx)
#   - certbot for TLS (apt install certbot python3-certbot-nginx)
#   - Run: sudo certbot --nginx -d rpc.iona-testnet.example.com
# =============================================================================

# -----------------------------------------------------------------------------
# Rate limiting zones (shared memory)
# -----------------------------------------------------------------------------
# General RPC: 10 req/s per IP
limit_req_zone $binary_remote_addr zone=rpc_general:10m rate=10r/s;
# Faucet: 1 req/min per IP (prevents abuse)
limit_req_zone $binary_remote_addr zone=rpc_faucet:10m rate=1r/m;
# Health endpoint: generous limit for monitoring
limit_req_zone $binary_remote_addr zone=rpc_health:10m rate=30r/s;
# WebSocket: higher limit for subscription connections
limit_req_zone $binary_remote_addr zone=rpc_ws:10m rate=5r/s;

# -----------------------------------------------------------------------------
# Connection limiting
# -----------------------------------------------------------------------------
limit_conn_zone $binary_remote_addr zone=rpc_conn:10m;

# -----------------------------------------------------------------------------
# Upstream backend (IONA RPC nodes)
# -----------------------------------------------------------------------------
upstream iona_rpc {
    least_conn;                       # distributes connections to the least loaded node
    server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
    # Add more backends for horizontal scaling:
    # server 10.0.1.11:9000 max_fails=3 fail_timeout=30s;
    # server 10.0.1.12:9000 max_fails=3 fail_timeout=30s;
    keepalive 64;                     # keep connections open for reuse
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# -----------------------------------------------------------------------------
# HTTP → HTTPS redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name rpc.iona-testnet.example.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS server (production)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rpc.iona-testnet.example.com;

    # ── TLS Configuration ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rpc.iona-testnet.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.iona-testnet.example.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling (improves handshake time)
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── CORS for dApps ────────────────────────────────────────────────────
    # Restrict origins in production to your frontend domains
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1|.*\.iona\.network)$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin "$cors_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;
    add_header Access-Control-Max-Age 86400 always;

    # ── Request size limit ────────────────────────────────────────────────
    client_max_body_size 1m;

    # ── Connection limits ─────────────────────────────────────────────────
    limit_conn rpc_conn 20;

    # ── Proxy timeouts ────────────────────────────────────────────────────
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # ── Proxy buffers (prevents slow client attacks) ──────────────────────
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ── Block /metrics from public access (internal monitoring only) ──────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Faucet endpoint (heavily rate-limited) ────────────────────────────
    location /faucet {
        limit_req zone=rpc_faucet burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health endpoint (generous rate limit, no logging) ─────────────────
    location /health {
        limit_req zone=rpc_health burst=50 nodelay;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Status endpoint ───────────────────────────────────────────────────
    location /status {
        limit_req zone=rpc_general burst=20 nodelay;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket endpoint (for eth_subscribe) ────────────────────────────
    location /ws {
        limit_req zone=rpc_ws burst=10 nodelay;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # Long timeout for subscriptions
    }

    # ── Default: JSON-RPC + REST ──────────────────────────────────────────
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$cors_origin";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        limit_req zone=rpc_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Custom error pages ────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"jsonrpc":"2.0","error":{"code":-32000,"message":"Rate limit exceeded. Retry after a moment."}}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 502 '{"jsonrpc":"2.0","error":{"code":-32000,"message":"Service temporarily unavailable."}}';
    }

    # ── Nginx status (internal monitoring only) ───────────────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        access_log off;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/iona-rpc-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/iona-rpc-error.log warn;
}
