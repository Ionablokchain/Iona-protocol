# IONA RPC Reverse Proxy Configuration
# File: deploy/nginx/rpc.conf
#
# Install: sudo cp deploy/nginx/rpc.conf /etc/nginx/sites-available/iona-rpc
#          sudo ln -s /etc/nginx/sites-available/iona-rpc /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - nginx installed (apt install nginx)
#   - certbot for TLS (apt install certbot python3-certbot-nginx)
#   - Run: sudo certbot --nginx -d rpc.iona-testnet.example.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=rpc_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=rpc_faucet:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=rpc_health:10m rate=30r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=rpc_conn:10m;

upstream iona_rpc {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name rpc.iona-testnet.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rpc.iona-testnet.example.com;

    # TLS (managed by certbot or manual)
    ssl_certificate     /etc/letsencrypt/live/rpc.iona-testnet.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.iona-testnet.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS for dApps
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Max-Age 86400 always;

    # Request size limit (1MB max body)
    client_max_body_size 1m;

    # Connection limits
    limit_conn rpc_conn 20;

    # Strict timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # Block /metrics from public access
    location /metrics {
        return 403;
    }

    # Faucet endpoint (heavily rate-limited: 1 req/min per IP)
    location /faucet {
        limit_req zone=rpc_faucet burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint (generous rate limit)
    location /health {
        limit_req zone=rpc_health burst=50 nodelay;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Status endpoint
    location /status {
        limit_req zone=rpc_general burst=20 nodelay;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default: JSON-RPC + REST (rate-limited)
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        limit_req zone=rpc_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable WebSocket by default (uncomment if needed)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # Custom error pages
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please retry after a moment."}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"RPC node is temporarily unavailable."}';
    }

    # Access log with request timing
    access_log /var/log/nginx/iona-rpc-access.log combined;
    error_log  /var/log/nginx/iona-rpc-error.log warn;
}
