# =============================================================================
# IONA Admin API Reverse Proxy — Production‑Grade Configuration
# =============================================================================
#
# Provides secure, authenticated access to the IONA admin API.
# This endpoint must NEVER be exposed to the public internet.
#
# Security layers:
#   1. Binds only to loopback / management interface
#   2. Mutual TLS (mTLS) – clients must present a valid certificate
#   3. IP whitelist – only authorised subnets can connect
#   4. Rate limiting – per‑IP token bucket for sensitive operations
#   5. Security headers – X‑Frame‑Options, HSTS, etc.
#
# Installation:
#   sudo cp admin-api.conf /etc/nginx/sites-available/iona-admin
#   sudo ln -s /etc/nginx/sites-available/iona-admin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Rate limiting zones (shared memory) ──────────────────────────────────────
# General admin requests: 5 req/s per IP
limit_req_zone $binary_remote_addr zone=admin_general:10m rate=5r/s;
# Sensitive operations (reset, upgrade): 1 req/min per IP
limit_req_zone $binary_remote_addr zone=admin_sensitive:10m rate=1r/m;

# ── Connection limiting ──────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=admin_conn:10m;

# ── Upstream backend (IONA admin API) ────────────────────────────────────────
upstream iona_admin_backend {
    server 127.0.0.1:9002;
    keepalive 16;
}

# ── Main server block ────────────────────────────────────────────────────────
server {
    # Bind ONLY to localhost or dedicated management interface.
    # Replace 127.0.0.1 with your management VLAN IP for remote access.
    listen 127.0.0.1:8443 ssl http2;
    listen [::1]:8443 ssl http2;

    server_name _;

    # ── TLS / mTLS Configuration ────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS13+AESGCM+AES256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:AdminSSL:10m;
    ssl_session_tickets off;

    # OCSP stapling (improves handshake performance)
    ssl_stapling on;
    ssl_stapling_verify on;

    # Server certificate (issued by your internal CA)
    ssl_certificate /etc/iona/certs/admin-server.crt;
    ssl_certificate_key /etc/iona/certs/admin-server.key;

    # ── Mutual TLS ─────────────────────────────────────────────────────────
    ssl_verify_client on;
    ssl_verify_depth 2;
    ssl_client_certificate /etc/iona/certs/admin-ca.crt;
    ssl_trusted_certificate /etc/iona/certs/admin-ca.crt;

    # Custom error page for failed client certificate
    error_page 495 = @mTLS_error;
    location @mTLS_error {
        default_type application/json;
        return 403 '{"error":"mTLS verification failed","message":"Present a valid client certificate signed by the admin CA"}';
    }

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/iona_admin_access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/iona_admin_error.log warn;

    # ── IP‑based access control ────────────────────────────────────────────
    # Allow loopback (always)
    allow 127.0.0.1;
    allow ::1;
    # Add your management subnets here:
    # allow 10.255.0.0/16;     # management VPN
    # allow 172.16.0.0/12;     # private cloud management
    deny all;

    # ── Connection and body limits ─────────────────────────────────────────
    limit_conn admin_conn 10;
    client_max_body_size 10m;

    # ── Timeouts ───────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── Admin API endpoints ────────────────────────────────────────────────

    # Health check (no rate limiting, no mTLS? No, mTLS still required for consistency)
    location /health {
        limit_req zone=admin_general burst=10 nodelay;
        proxy_pass http://iona_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Status / diagnostics
    location /status {
        limit_req zone=admin_general burst=10 nodelay;
        proxy_pass http://iona_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Metrics (Prometheus) — only accessible via admin proxy
    location /metrics {
        limit_req zone=admin_general burst=5 nodelay;
        proxy_pass http://iona_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Sensitive operations (reset, upgrade, key rotation)
    location ~ ^/(reset-chain|reset-identity|reset-full|upgrade-trigger|key-rotate|schema-migrate) {
        limit_req zone=admin_sensitive burst=1 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for long‑running operations
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Default: all other admin endpoints
    location / {
        limit_req zone=admin_general burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_admin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Custom error pages ─────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Retry after a moment."}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"Admin API temporarily unavailable."}';
    }

    # ── Nginx status (internal monitoring only) ────────────────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow ::1;
        deny all;
        access_log off;
    }
}
