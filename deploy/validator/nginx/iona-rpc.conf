# =============================================================================
# IONA RPC Reverse Proxy — Production‑Grade Configuration
# =============================================================================
#
# This nginx configuration proxies safe RPC endpoints to the public internet.
# The actual RPC server listens on 127.0.0.1:9001 (loopback only).
# This reverse proxy enforces rate limiting, security headers, and HTTPS.
#
# Installation:
#   sudo cp rpc.conf /etc/nginx/sites-available/iona-rpc
#   sudo ln -s /etc/nginx/sites-available/iona-rpc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Rate limiting zones (shared memory) ──────────────────────────────────────
# General RPC: 100 req/min per IP
limit_req_zone $binary_remote_addr zone=rpc_general:10m rate=100r/m;
# Health endpoint: generous limit for monitoring
limit_req_zone $binary_remote_addr zone=rpc_health:10m rate=1000r/m;
# Faucet endpoint: 1 req/min per IP (prevents abuse)
limit_req_zone $binary_remote_addr zone=rpc_faucet:10m rate=1r/m;

# ── Connection limiting ──────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=rpc_conn:10m;

# ── Upstream backend (IONA RPC server) ───────────────────────────────────────
upstream iona_rpc {
    least_conn;
    server 127.0.0.1:9001 max_fails=3 fail_timeout=30s;
    # Add more backends for horizontal scaling:
    # server 10.0.1.11:9001 max_fails=3 fail_timeout=30s;
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS RPC Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── TLS Configuration ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS13+AESGCM+AES256:TLS13+AESGCM+CHACHA20:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Certificate paths (configure for your domain)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── CORS for dApps ────────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1|.*\.iona\.network)$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin "$cors_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;
    add_header Access-Control-Max-Age 86400 always;

    # ── Custom access log format ───────────────────────────────────────────
    log_format iona_rpc_log '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'req_id=$http_x_request_id response_time=$request_time';

    access_log /var/log/nginx/iona_rpc_access.log iona_rpc_log buffer=16k flush=5s;
    error_log /var/log/nginx/iona_rpc_error.log warn;

    # ── Connection and body limits ─────────────────────────────────────────
    limit_conn rpc_conn 20;
    client_max_body_size 1m;

    # ── Proxy timeouts ─────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # ── Proxy buffers ──────────────────────────────────────────────────────
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ── Health endpoint (no rate limiting, short timeout, no logging) ──────
    location = /health {
        limit_req zone=rpc_health burst=100 nodelay;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        access_log off;
    }

    # ── Status endpoint ────────────────────────────────────────────────────
    location = /status {
        limit_req zone=rpc_general burst=20 nodelay;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Faucet endpoint (heavily rate-limited) ─────────────────────────────
    location = /faucet {
        limit_req zone=rpc_faucet burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket endpoint (for eth_subscribe) ─────────────────────────────
    location = /ws {
        limit_req zone=rpc_general burst=10 nodelay;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ── Block /metrics from public access ──────────────────────────────────
    location = /metrics {
        return 403;
    }

    # ── Block /admin endpoints explicitly ──────────────────────────────────
    location ~ ^/admin {
        return 403;
    }

    # ── Default: JSON-RPC + REST ───────────────────────────────────────────
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$cors_origin";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        limit_req zone=rpc_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;
    }

    # ── Custom error pages ─────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"jsonrpc":"2.0","error":{"code":-32000,"message":"Rate limit exceeded. Retry after a moment."}}';
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        default_type application/json;
        return 502 '{"jsonrpc":"2.0","error":{"code":-32000,"message":"Service temporarily unavailable."}}';
    }
}
