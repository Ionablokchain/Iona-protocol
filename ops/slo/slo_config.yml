# =============================================================================
# IONA v28 SLO Configuration — Production-Grade
# =============================================================================
# Service Level Objectives for IONA blockchain validator operations.
# Compatible with Prometheus, Pyrra, Sloth, OpenSLO, and Grafana SLO.
#
# Design principles:
#   - Every SLO has a clearly defined SLI with concrete PromQL queries.
#   - Error budgets are tracked with burn-rate alerts (based on Google SRE workbook).
#   - Alert severities follow IONA incident management: warning → critical → page.
#   - All windows are aligned to 30d for consistent error budget calculation.
# =============================================================================

apiVersion: openslo/v1
kind: SLO
metadata:
  name: iona-validator-slos
  labels:
    app.kubernetes.io/name: iona
    app.kubernetes.io/component: validator
    app.kubernetes.io/part-of: iona-blockchain
    team: infrastructure
    tier: production
spec:
  # ---------------------------------------------------------------------------
  # SLO 1 – Validator Uptime
  # ---------------------------------------------------------------------------
  # The validator process must be alive and participating in consensus.
  # Error budget (30d @ 99.5%): 3.6 hours
  - name: validator-uptime
    description: "Validator node is up and participating in consensus"
    target: 99.5
    window: 30d
    
    sli:
      metricSource:
        type: prometheus
        endpoint: http://prometheus-operated.monitoring:9090
      goodQuery: |
        # Returns 1 when validator commits blocks; 0 when silent
        rate(iona_blocks_committed_total[5m]) > 0
        or
        absent(iona_blocks_committed_total)
      totalQuery: |
        1

    alertWindows:
      - name: "5m-fast-detection"
        duration: 5m
        severity: warning
        labels:
          priority: "P2"
      - name: "1h-sustained-outage"
        duration: 1h
        severity: critical
        labels:
          priority: "P1"

  # ---------------------------------------------------------------------------
  # SLO 2 – Block Signing Rate
  # ---------------------------------------------------------------------------
  # Ratio of blocks signed by this validator vs blocks it was expected to sign.
  # Error budget (30d @ 99.9%): 26 minutes
  - name: block-signing-rate
    description: "Validator successfully signs proposed blocks"
    target: 99.9
    window: 30d

    sli:
      metricSource:
        type: prometheus
        endpoint: http://prometheus-operated.monitoring:9090
      goodQuery: |
        # signed / proposed; returns NaN if denominator is 0 (handled by totalQuery)
        rate(iona_blocks_signed_total[5m])
        /
        on() rate(iona_blocks_proposed_total[5m])
      totalQuery: |
        # Ensure we only count periods where the validator was actually a proposer
        rate(iona_blocks_proposed_total[5m])
        /
        on() rate(iona_blocks_proposed_total[5m])

    alertWindows:
      - name: "30m-moderate-miss"
        duration: 30m
        severity: warning
        labels:
          priority: "P2"
      - name: "2h-sustained-miss"
        duration: 2h
        severity: critical
        labels:
          priority: "P1"

  # ---------------------------------------------------------------------------
  # SLO 3 – RPC Availability
  # ---------------------------------------------------------------------------
  # The RPC endpoint must return non-5xx responses for client requests.
  # Error budget (30d @ 99.9%): 26 minutes
  - name: rpc-availability
    description: "RPC endpoint returns successful responses"
    target: 99.9
    window: 30d

    sli:
      metricSource:
        type: prometheus
        endpoint: http://prometheus-operated.monitoring:9090
      goodQuery: |
        # Non-5xx rate (2xx + 3xx + 4xx are considered "good" from a server view)
        rate(iona_rpc_requests_total{status!~"5.."}[5m])
        /
        rate(iona_rpc_requests_total[5m])
      totalQuery: |
        rate(iona_rpc_requests_total[5m])
        /
        rate(iona_rpc_requests_total[5m])

    alertWindows:
      - name: "5m-spike-detection"
        duration: 5m
        severity: warning
        labels:
          priority: "P2"
      - name: "1h-sustained-failure"
        duration: 1h
        severity: critical
        labels:
          priority: "P1"

  # ---------------------------------------------------------------------------
  # SLO 4 – Consensus Height Freshness
  # ---------------------------------------------------------------------------
  # The validator must not lag behind the network consensus height.
  # Error budget (30d @ 99.8%): 4.3 hours
  - name: consensus-freshness
    description: "Validator consensus height lag <= 2 blocks"
    target: 99.8
    window: 30d

    sli:
      metricSource:
        type: prometheus
        endpoint: http://prometheus-operated.monitoring:9090
      goodQuery: |
        # True (1) when lag <= 2 blocks (slightly relaxed from 1 for realistic ops)
        iona_consensus_height_lag <= 2
        or
        absent(iona_consensus_height_lag)
      totalQuery: |
        1

    alertWindows:
      - name: "10m-slight-lag"
        duration: 10m
        severity: warning
        labels:
          priority: "P3"
      - name: "1h-sustained-lag"
        duration: 1h
        severity: critical
        labels:
          priority: "P1"

  # ---------------------------------------------------------------------------
  # SLO 5 – P2P Network Connectivity
  # ---------------------------------------------------------------------------
  # The validator must maintain a healthy peer set for consensus messages.
  # Error budget (30d @ 99.5%): 3.6 hours
  - name: p2p-connectivity
    description: "Validator connected to healthy peer set"
    target: 99.5
    window: 30d

    sli:
      metricSource:
        type: prometheus
        endpoint: http://prometheus-operated.monitoring:9090
      goodQuery: |
        # At least 10 peers (adjust based on network size)
        iona_peer_count >= 10
        or
        absent(iona_peer_count)
      totalQuery: |
        1

    alertWindows:
      - name: "15m-peer-loss"
        duration: 15m
        severity: warning
        labels:
          priority: "P2"
      - name: "2h-severe-isolation"
        duration: 2h
        severity: critical
        labels:
          priority: "P1"

  # ---------------------------------------------------------------------------
  # Error Budget Burn Rate Alerts (Google SRE Workbook, Chapter 5)
  # ---------------------------------------------------------------------------
  # These alerts detect when the error budget is being consumed faster than
  # expected, allowing teams to respond before the budget is exhausted.
  errorBudgets:
    # Validator uptime budget
    - name: validator-uptime-burn
      slo: validator-uptime
      alerts:
        - name: HighBurnRate
          shortWindow: 1h
          longWindow: 6h
          burnRateThreshold: 10    # consumes 10% of budget in 1h → critical
          severity: critical
          labels:
            priority: "P1"
        - name: MediumBurnRate
          shortWindow: 6h
          longWindow: 24h
          burnRateThreshold: 2     # consumes 2% in 6h → warning
          severity: warning
          labels:
            priority: "P2"

    # Block signing budget
    - name: block-signing-burn
      slo: block-signing-rate
      alerts:
        - name: HighBurnRate
          shortWindow: 30m
          longWindow: 2h
          burnRateThreshold: 15
          severity: critical
          labels:
            priority: "P1"
        - name: MediumBurnRate
          shortWindow: 2h
          longWindow: 12h
          burnRateThreshold: 5
          severity: warning
          labels:
            priority: "P2"

    # RPC availability budget
    - name: rpc-availability-burn
      slo: rpc-availability
      alerts:
        - name: HighBurnRate
          shortWindow: 5m
          longWindow: 1h
          burnRateThreshold: 30
          severity: critical
          labels:
            priority: "P1"
        - name: MediumBurnRate
          shortWindow: 30m
          longWindow: 6h
          burnRateThreshold: 10
          severity: warning
          labels:
            priority: "P2"

  # ---------------------------------------------------------------------------
  # Notification targets
  # ---------------------------------------------------------------------------
  # Where alerts are routed when error budget burns are detected.
  notificationTargets:
    - name: validator-oncall-pagerduty
      type: pagerduty
      routingKey: "${PAGERDUTY_ROUTING_KEY}"
      severity: critical
    - name: validator-oncall-slack
      type: slack
      webhookUrl: "${SLACK_WEBHOOK_URL}"
      channel: "#validator-alerts"
      severity: warning
    - name: ops-email
      type: email
      address: validator-ops@example.invalid
      severity: warning
