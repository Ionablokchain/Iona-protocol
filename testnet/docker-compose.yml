# =============================================================================
# IONA Testnet v30.0.0 — Docker Compose (Production‑Grade)
# =============================================================================
# 4‑node validator network + Prometheus metrics.
#
# Usage:
#   docker compose up -d
#   docker compose down
#   docker compose logs -f validator-1
#
# Environment variables (optional):
#   IONA_VERSION   - image tag (default: 30.0.0)
#   NETWORK_SUBNET - custom subnet (default: 172.20.0.0/24)
# =============================================================================

version: '3.9'

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
x-iona_version: &iona_version ${IONA_VERSION:-30.0.0}
x-subnet: &subnet ${NETWORK_SUBNET:-172.20.0.0/24}

# -----------------------------------------------------------------------------
# Common validator configuration
# -----------------------------------------------------------------------------
x-validator-base: &validator-base
  image: iona/iona-node:*iona_version
  networks:
    iona-testnet:
  stop_grace_period: 30s
  environment:
    RUST_LOG: info
    RUST_BACKTRACE: 0
    IONA_KEYSTORE_PASSWORD: ""           # set via Docker secret or .env
  command: >
    iona-node
    --config /etc/iona/config.toml
    --data /var/lib/iona
    --profile prod
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:9001/health || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 30s
  restart: unless-stopped
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp
    - /var/lib/iona/data:mode=1777,size=2G  # writable data directory

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
services:
  validator-1:
    <<: *validator-base
    container_name: iona-validator-1
    ports:
      - "9001:9001"   # RPC
      - "7001:7001"   # P2P
      - "9091:9091"   # Prometheus metrics
    volumes:
      - ./data/validator-1:/var/lib/iona
      - ./configs/validator-1.toml:/etc/iona/config.toml:ro
    environment:
      NODE_ID: 1
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  validator-2:
    <<: *validator-base
    container_name: iona-validator-2
    ports:
      - "9011:9001"
      - "7011:7001"
      - "9092:9091"
    volumes:
      - ./data/validator-2:/var/lib/iona
      - ./configs/validator-2.toml:/etc/iona/config.toml:ro
    environment:
      NODE_ID: 2
    depends_on:
      validator-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  validator-3:
    <<: *validator-base
    container_name: iona-validator-3
    ports:
      - "9021:9001"
      - "7021:7001"
      - "9093:9091"
    volumes:
      - ./data/validator-3:/var/lib/iona
      - ./configs/validator-3.toml:/etc/iona/config.toml:ro
    environment:
      NODE_ID: 3
    depends_on:
      validator-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  validator-4:
    <<: *validator-base
    container_name: iona-validator-4
    ports:
      - "9031:9001"
      - "7031:7001"
      - "9094:9091"
    volumes:
      - ./data/validator-4:/var/lib/iona
      - ./configs/validator-4.toml:/etc/iona/config.toml:ro
    environment:
      NODE_ID: 4
    depends_on:
      validator-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ---------------------------------------------------------------------------
  # Prometheus metrics
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: iona-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      iona-testnet:
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  iona-testnet:
    name: iona-testnet
    driver: bridge
    ipam:
      config:
        - subnet: *subnet

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  prometheus-data:
    driver: local
