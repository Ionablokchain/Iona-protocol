# =============================================================================
# IONA Testnet v28.7.0 — Prometheus Configuration
# =============================================================================
# Scrapes metrics from 4 validator nodes and Prometheus itself.
#
# Usage:
#   Place this file in ./prometheus/prometheus.yml
#   Then start Prometheus: docker-compose up -d prometheus
# =============================================================================

# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
global:
  # How frequently to scrape targets by default.
  scrape_interval: 15s

  # How frequently to evaluate rules (for alerting).
  evaluation_interval: 15s

  # How long to wait for a target to respond before marking it as down.
  scrape_timeout: 10s

  # External labels added to any time series when communicating with external systems.
  external_labels:
    monitor: 'iona-testnet'
    environment: 'testnet'

# -----------------------------------------------------------------------------
# Alerting (optional – uncomment if you have alertmanager)
# -----------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# -----------------------------------------------------------------------------
# Rule files (optional – uncomment if you have alert rules)
# -----------------------------------------------------------------------------
# rule_files:
#   - "/etc/prometheus/alerts/*.yml"

# -----------------------------------------------------------------------------
# Scrape configurations
# -----------------------------------------------------------------------------
scrape_configs:
  # Job for IONA validator nodes (metrics exposed via HTTP)
  - job_name: 'iona_validators'
    # Scrape interval can be overridden per job
    scrape_interval: 10s
    scrape_timeout: 5s

    # Metrics path (default is /metrics)
    metrics_path: '/metrics'

    # Static targets (IPs or hostnames as defined in docker-compose)
    static_configs:
      - targets:
          - 'validator-1:6001'
          - 'validator-2:6001'
          - 'validator-3:6001'
          - 'validator-4:6001'
        labels:
          network: 'iona-testnet-1'
          role: 'validator'
          # Optional: add instance label separately if needed
          # instance: 'validator-${NODE_ID}'

    # Basic HTTP authentication (if metrics endpoint requires auth – usually not)
    # basic_auth:
    #   username: 'prometheus'
    #   password: 'secret'

    # Relabel configs to add node-specific labels (e.g., extract node ID from hostname)
    # relabel_configs:
    #   - source_labels: ['__address__']
    #     regex: 'validator-([0-9]+):.*'
    #     target_label: 'node_id'
    #     replacement: '$1'

  # Job for Prometheus itself (self-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          job: 'prometheus'
          component: 'monitoring'
    # Scrape Prometheus' own internal metrics
    metrics_path: '/metrics'

  # Optional: Blackbox exporter (for external endpoint monitoring)
  # - job_name: 'blackbox'
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #         - https://iona.example.com/health
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115
